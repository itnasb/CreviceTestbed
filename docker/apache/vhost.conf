<VirtualHost *:80>
  ServerName localhost

  # Make hub the homepage
  DocumentRoot /var/www/html/hub
  DirectoryIndex index.php index.html

  <Directory /var/www/html/hub>
    AllowOverride All
    Require all granted
    Options FollowSymLinks
  </Directory>

  # Labs at /labs (change back to /lab if you prefer)
  Alias /labs /var/www/html/labs
  <Directory /var/www/html/labs>
    AllowOverride All
    Require all granted
    Options FollowSymLinks
  </Directory>

  # Shared assets at /shared
  Alias /shared /var/www/html/shared
  <Directory /var/www/html/shared>
    AllowOverride None
    Require all granted
    Options FollowSymLinks
  </Directory>

  RewriteEngine On
</VirtualHost>
